name: CV to PDF
# https://github.com/BaileyJM02/markdown-to-pdf

on:
  push:
    branches:
      - master
    paths:
      - 'josef_cacek_cv.md'
      - '.github/workflows/cv-to-pdf.yml'

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: baileyjm02/markdown-to-pdf@v1.2.0
        with:
          input_path: josef_cacek_cv.md
          output_dir: pdfs
          build_html: false
      - name: Move cv tag to latest commit
        run: |
          git tag -f cv
          git push origin cv --force
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: pdfs/josef_cacek_cv.pdf
          tag: cv
          overwrite: true
